name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          VITE_WEB3FORMS_KEY: ${{ secrets.VITE_WEB3FORMS_KEY }}
          VITE_ZAPIER_WEBHOOK_URL: ${{ secrets.VITE_ZAPIER_WEBHOOK_URL }}
          VITE_BOOK_CALL_WEBHOOK_URL: ${{ secrets.VITE_BOOK_CALL_WEBHOOK_URL }}
          VITE_CONTACT_WEBHOOK_URL: ${{ secrets.VITE_CONTACT_WEBHOOK_URL }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_BOOKING_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_BOOKING_TEMPLATE_ID }}
          VITE_EMAILJS_CONTACT_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_CONTACT_TEMPLATE_ID }}
          VITE_CAL_COM_LINK: ${{ secrets.VITE_CAL_COM_LINK }}

      - name: Check Azure secret presence
        shell: bash
        run: |
          if [ -n "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_WATER_027449900 }}" ]; then
            echo "AZURE_SECRET_PRESENT=true" >> "$GITHUB_ENV"
          else
            echo "AZURE_SECRET_PRESENT=false" >> "$GITHUB_ENV"
          fi

      - name: Build And Deploy
        id: builddeploy
        if: env.AZURE_SECRET_PRESENT == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_WATER_027449900 }}
          action: "upload"
          app_location: "/"
          output_location: "dist"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Check Azure secret presence
        shell: bash
        run: |
          if [ -n "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_WATER_027449900 }}" ]; then
            echo "AZURE_SECRET_PRESENT=true" >> "$GITHUB_ENV"
          else
            echo "AZURE_SECRET_PRESENT=false" >> "$GITHUB_ENV"
          fi

      - name: Close Pull Request
        id: closepullrequest
        if: env.AZURE_SECRET_PRESENT == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_WATER_027449900 }}
          action: "close"
