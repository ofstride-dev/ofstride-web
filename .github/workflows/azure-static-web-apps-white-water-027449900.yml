name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          VITE_WEB3FORMS_KEY: ${{ secrets.VITE_WEB3FORMS_KEY || vars.VITE_WEB3FORMS_KEY }}
          VITE_ZAPIER_WEBHOOK_URL: ${{ secrets.VITE_ZAPIER_WEBHOOK_URL || vars.VITE_ZAPIER_WEBHOOK_URL }}
          VITE_BOOK_CALL_WEBHOOK_URL: ${{ secrets.VITE_BOOK_CALL_WEBHOOK_URL || vars.VITE_BOOK_CALL_WEBHOOK_URL }}
          VITE_CONTACT_WEBHOOK_URL: ${{ secrets.VITE_CONTACT_WEBHOOK_URL || vars.VITE_CONTACT_WEBHOOK_URL }}
          VITE_MAKE_WEBHOOK_CHAT_URL: ${{ secrets.VITE_MAKE_WEBHOOK_CHAT_URL || vars.VITE_MAKE_WEBHOOK_CHAT_URL }}
          VITE_MAKE_WEBHOOK_CALENDAR_URL: ${{ secrets.VITE_MAKE_WEBHOOK_CALENDAR_URL || vars.VITE_MAKE_WEBHOOK_CALENDAR_URL }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID || vars.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY || vars.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID || vars.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_BOOKING_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_BOOKING_TEMPLATE_ID || vars.VITE_EMAILJS_BOOKING_TEMPLATE_ID }}
          VITE_EMAILJS_CONTACT_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_CONTACT_TEMPLATE_ID || vars.VITE_EMAILJS_CONTACT_TEMPLATE_ID }}
          VITE_CAL_COM_LINK: ${{ secrets.VITE_CAL_COM_LINK || vars.VITE_CAL_COM_LINK }}

          VITE_ADMIN_API_KEY: ${{ secrets.VITE_ADMIN_API_KEY || vars.VITE_ADMIN_API_KEY }}

          VITE_CAREER_API_URL: ${{ secrets.VITE_CAREER_API_URL || vars.VITE_CAREER_API_URL || 'https://func-ofs-carrer-001-dzd4h9andncbhfha.southindia-01.azurewebsites.net/api' }}
          VITE_AUTH_REDIRECT_URL: ${{ secrets.VITE_AUTH_REDIRECT_URL || vars.VITE_AUTH_REDIRECT_URL }}

          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL || 'https://jxocmzvsspdnooganlps.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4b2NtenZzc3Bkbm9vZ2FubHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjM0MzksImV4cCI6MjA5OTQ5OTQzOX0.73Z_CEYshcU-sGEPs9pOD6Im8exNDzAqrLqywT4anBc' }}

      - name: Include Static Web App config in artifact
        shell: bash
        run: cp staticwebapp.config.json dist/staticwebapp.config.json

      - name: Validate form env presence
        shell: bash
        run: |
          if [ -z "${{ secrets.VITE_WEB3FORMS_KEY || vars.VITE_WEB3FORMS_KEY }}" ] && \
             [ -z "${{ secrets.VITE_ZAPIER_WEBHOOK_URL || vars.VITE_ZAPIER_WEBHOOK_URL }}" ] && \
             [ -z "${{ secrets.VITE_BOOK_CALL_WEBHOOK_URL || vars.VITE_BOOK_CALL_WEBHOOK_URL }}" ] && \
             [ -z "${{ secrets.VITE_CONTACT_WEBHOOK_URL || vars.VITE_CONTACT_WEBHOOK_URL }}" ] && \
             [ -z "${{ secrets.VITE_MAKE_WEBHOOK_CHAT_URL || vars.VITE_MAKE_WEBHOOK_CHAT_URL }}" ] && \
             [ -z "${{ secrets.VITE_MAKE_WEBHOOK_CALENDAR_URL || vars.VITE_MAKE_WEBHOOK_CALENDAR_URL }}" ]; then
            echo "No form provider env is configured. Set at least one VITE_* provider value." >&2
            exit 1
          fi

      - name: Check Azure secret presence
        shell: bash
        run: |
          if [ -n "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_WATER_027449900 }}" ]; then
            echo "AZURE_SECRET_PRESENT=true" >> "$GITHUB_ENV"
          else
            echo "AZURE_SECRET_PRESENT=false" >> "$GITHUB_ENV"
          fi

      - name: Build And Deploy
        id: builddeploy
        if: env.AZURE_SECRET_PRESENT == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_WATER_027449900 }}
          action: "upload"
          app_location: "dist"
          api_location: "api"
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Check Azure secret presence
        shell: bash
        run: |
          if [ -n "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_WATER_027449900 }}" ]; then
            echo "AZURE_SECRET_PRESENT=true" >> "$GITHUB_ENV"
          else
            echo "AZURE_SECRET_PRESENT=false" >> "$GITHUB_ENV"
          fi

      - name: Close Pull Request
        id: closepullrequest
        if: env.AZURE_SECRET_PRESENT == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_WATER_027449900 }}
          action: "close"
