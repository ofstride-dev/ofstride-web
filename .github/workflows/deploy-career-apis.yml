name: Deploy Career APIs to Azure Functions
on:
  push:
    branches:
      - main
    paths:
      - 'api/careers_manage/**'
      - 'api/careers_complete/**'
      - 'api/careers_init_upload/**'
      - 'api/jobs/**'
      - 'api/shared/**'
      - 'api/requirements.txt'
      - 'api/requirements-careers.txt'
      - 'api/host.json'
      - '.github/workflows/deploy-career-apis.yml'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Career Stack APIs
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Stage Career Function Folders
        shell: bash
        run: |
          mkdir -p __staged_careers
          cp -r api/careers_manage __staged_careers/
          cp -r api/careers_complete __staged_careers/
          cp -r api/careers_init_upload __staged_careers/
          cp -r api/jobs __staged_careers/
          cp -r api/shared __staged_careers/
          cp api/host.json __staged_careers/
          # Use the minimal career-only requirements to reduce build failures
          cp api/requirements-careers.txt __staged_careers/requirements.txt
          cp api/.python-version __staged_careers/ 2>/dev/null || true
          # Verify the staged requirements.txt has azure-storage-blob
          echo "=== Staged requirements.txt ==="
          cat __staged_careers/requirements.txt
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EED27B738214446BB01573AD4107388D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_233886A9334C42A7B361D9577C76190C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D79D86DAA64341A6AD251FEC74A6333C }}
      - name: Ensure Oryx Build Settings
        shell: bash
        run: |
          RG=$(az resource list --name func-ofs-carrer-001 --resource-type Microsoft.Web/sites --query "[0].resourceGroup" -o tsv)
          if [ -z "$RG" ]; then
            echo "ERROR: Could not resolve resource group for Function App func-ofs-carrer-001"
            exit 1
          fi
          # Ensure the Function App has Oryx build enabled so requirements.txt is processed
          az functionapp config appsettings set \
            --name func-ofs-carrer-001 \
            --resource-group "$RG" \
            --settings \
              ENABLE_ORYX_BUILD=true \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              PYTHON_IS_WORKER_IN_VENV=true \
            || echo "WARN: could not set appsettings (may already be configured)"
      - name: Sync Optional LLM Settings (Same CI/CD Pipeline)
        shell: bash
        env:
          LLM_PROVIDER: ${{ secrets.CAREERS_LLM_PROVIDER }}
          MODEL_NAME: ${{ secrets.CAREERS_MODEL_NAME }}
          OPENAI_API_KEY: ${{ secrets.CAREERS_OPENAI_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.CAREERS_AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.CAREERS_AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.CAREERS_AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.CAREERS_AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.CAREERS_AZURE_OPENAI_API_VERSION }}
          GEMINI_API_KEY: ${{ secrets.CAREERS_GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.CAREERS_GEMINI_MODEL }}
          ALLOW_MOCK_PROVIDER: ${{ secrets.CAREERS_ALLOW_MOCK_PROVIDER }}
        run: |
          RG=$(az resource list --name func-ofs-carrer-001 --resource-type Microsoft.Web/sites --query "[0].resourceGroup" -o tsv)
          if [ -z "$RG" ]; then
            echo "ERROR: Could not resolve resource group for Function App func-ofs-carrer-001"
            exit 1
          fi
          SETTINGS=()

          add_setting() {
            local key="$1"
            local value="$2"
            if [ -n "$value" ]; then
              SETTINGS+=("${key}=${value}")
            fi
          }

          add_setting "LLM_PROVIDER" "$LLM_PROVIDER"
          add_setting "MODEL_NAME" "$MODEL_NAME"
          add_setting "OPENAI_API_KEY" "$OPENAI_API_KEY"
          add_setting "AZURE_OPENAI_API_KEY" "$AZURE_OPENAI_API_KEY"
          add_setting "AZURE_OPENAI_ENDPOINT" "$AZURE_OPENAI_ENDPOINT"
          add_setting "AZURE_OPENAI_DEPLOYMENT" "$AZURE_OPENAI_DEPLOYMENT"
          add_setting "AZURE_OPENAI_EMBEDDING_DEPLOYMENT" "$AZURE_OPENAI_EMBEDDING_DEPLOYMENT"
          add_setting "AZURE_OPENAI_API_VERSION" "$AZURE_OPENAI_API_VERSION"
          add_setting "GEMINI_API_KEY" "$GEMINI_API_KEY"
          add_setting "GEMINI_MODEL" "$GEMINI_MODEL"
          add_setting "ALLOW_MOCK_PROVIDER" "$ALLOW_MOCK_PROVIDER"

          if [ ${#SETTINGS[@]} -eq 0 ]; then
            echo "No optional LLM settings provided via secrets; skipping appsettings sync."
            exit 0
          fi

          az functionapp config appsettings set \
            --name func-ofs-carrer-001 \
            --resource-group "$RG" \
            --settings "${SETTINGS[@]}"
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-ofs-carrer-001
          package: __staged_careers
          scm-do-build-during-deployment: true
      - name: Verify Deployment Health
        shell: bash
        run: |
          sleep 15
          BASE="https://func-ofs-carrer-001-dzd4h9andncbhfha.southindia-01.azurewebsites.net/api"
          echo "=== Health check: /jobs ==="
          curl -sS -m 30 "${BASE}/jobs?_t=$(date +%s)" | head -c 500 || echo "jobs endpoint not ready yet"
          echo ""
          echo "=== Deployment complete ==="