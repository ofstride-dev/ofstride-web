name: Deploy Career APIs to Azure Functions

on:
  push:
    branches:
      - main
    paths:
      - 'api/admin_careers/**'
      - 'api/careers_complete/**'
      - 'api/careers_init_upload/**'
      - 'api/jobs/**'
      - 'api/shared/**'
      - 'api/requirements.txt'
      - 'api/host.json'
      - '.github/workflows/deploy-career-apis.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Career Stack APIs
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Deploy Package
        shell: bash
        run: |
          mkdir -p __staged_careers
          cp -r api/admin_careers __staged_careers/
          cp -r api/careers_complete __staged_careers/
          cp -r api/careers_init_upload __staged_careers/
          cp -r api/jobs __staged_careers/
          cp -r api/shared __staged_careers/
          cp api/host.json __staged_careers/
          cp api/requirements.txt __staged_careers/
          cp api/.python_runtime __staged_careers/ 2>/dev/null || true
          pip install -r api/requirements.txt --target __staged_careers/.python_packages/lib/site-packages
          cd __staged_careers && zip -r ../career-deploy.zip . && cd ..

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EED27B738214446BB01573AD4107388D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_233886A9334C42A7B361D9577C76190C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D79D86DAA64341A6AD251FEC74A6333C }}

      - name: Deploy to Function App
        shell: bash
        run: |
          az functionapp deployment source config-zip \
            --name func-ofs-carrer-001 \
            --resource-group was-ofstride-002_group \
            --src career-deploy.zip \
            --timeout 600