name: Deploy Career APIs to Azure Functions

on:
  push:
    branches:
      - main
    paths:
      - 'api/admin_careers/**'
      - 'api/careers_complete/**'
      - 'api/careers_init_upload/**'
      - 'api/jobs/**'
      - 'api/shared/**'
      - 'api/requirements.txt'
      - 'api/host.json'
      - '.github/workflows/deploy-career-apis.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Career Stack APIs
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Stage Career Function Folders
        shell: bash
        run: |
          mkdir -p __staged_careers
          cp -r api/admin_careers __staged_careers/
          cp -r api/careers_complete __staged_careers/
          cp -r api/careers_init_upload __staged_careers/
          cp -r api/jobs __staged_careers/
          cp -r api/shared __staged_careers/
          cp api/host.json __staged_careers/
          cp api/requirements.txt __staged_careers/
          cp api/.python_runtime __staged_careers/ 2>/dev/null || true

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure Function App Settings (Oryx + Secrets)
        shell: bash
        run: |
          az functionapp config appsettings set \
            --name func-ofs-carrer-001 \
            --resource-group was-ofstride-002_group \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              ENABLE_ORYX_BUILD=true \
              "CAREERS_BLOB_CONNECTION_STRING=${{ secrets.CAREERS_BLOB_CONNECTION_STRING }}" \
              "CAREERS_JD_BLOB_CONTAINER=${{ vars.CAREERS_JD_BLOB_CONTAINER || 'careers-jd' }}" \
              "CAREERS_HR_EMAIL=${{ vars.CAREERS_HR_EMAIL || 'hr@ofstrideservices.com' }}" \
              "SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://jxocmzvsspdnooganlps.supabase.co' }}" \
              "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              "ADMIN_API_KEY=${{ secrets.VITE_ADMIN_API_KEY }}"

      - name: Deploy to Function App
        uses: Azure/functions-action@v1
        id: deploy
        with:
          app-name: func-ofs-carrer-001
          package: __staged_careers
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_CAREER }}
