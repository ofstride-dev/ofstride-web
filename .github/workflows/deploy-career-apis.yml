name: Deploy Career APIs to Azure Functions

on:
  push:
    branches:
      - main
    paths:
      - 'api/admin_careers/**'
      - 'api/careers_complete/**'
      - 'api/careers_init_upload/**'
      - 'api/jobs/**'
      - 'api/shared/**'
      - 'api/requirements.txt'
      - 'api/host.json'
      - '.github/workflows/deploy-career-apis.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Career Stack APIs
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Stage Career Function Folders
        shell: bash
        run: |
          mkdir -p __staged_careers
          cp -r api/admin_careers __staged_careers/
          cp -r api/careers_complete __staged_careers/
          cp -r api/careers_init_upload __staged_careers/
          cp -r api/jobs __staged_careers/
          cp -r api/shared __staged_careers/
          cp api/host.json __staged_careers/
          cp api/requirements.txt __staged_careers/
          cp api/.python_runtime __staged_careers/ 2>/dev/null || true

      - name: Configure Function App Settings (Oryx + Secrets)
        uses: azure/appservice-settings@v1
        with:
          app-name: func-ofs-carrer-001
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_CAREER }}
          app-settings-json: |
            [
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "true", "slotSetting": false },
              { "name": "ENABLE_ORYX_BUILD", "value": "true", "slotSetting": false },
              { "name": "CAREERS_BLOB_CONNECTION_STRING", "value": "${{ secrets.CAREERS_BLOB_CONNECTION_STRING }}", "slotSetting": false },
              { "name": "CAREERS_JD_BLOB_CONTAINER", "value": "${{ vars.CAREERS_JD_BLOB_CONTAINER || 'careers-jd' }}", "slotSetting": false },
              { "name": "CAREERS_HR_EMAIL", "value": "${{ vars.CAREERS_HR_EMAIL || 'hr@ofstrideservices.com' }}", "slotSetting": false },
              { "name": "SUPABASE_URL", "value": "${{ secrets.SUPABASE_URL || 'https://jxocmzvsspdnooganlps.supabase.co' }}", "slotSetting": false },
              { "name": "SUPABASE_SERVICE_ROLE_KEY", "value": "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}", "slotSetting": false },
              { "name": "ADMIN_API_KEY", "value": "${{ secrets.VITE_ADMIN_API_KEY }}", "slotSetting": false }
            ]

      - name: Deploy to Function App
        uses: Azure/functions-action@v1
        id: deploy
        with:
          app-name: func-ofs-carrer-001
          package: __staged_careers
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_CAREER }}
